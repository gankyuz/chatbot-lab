version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_estudo

    environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
    
    ports:
      - "5433:5432"

    volumes: 
      - postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase
    container_name: metabase_estudo

    ports:
      - "3000:3000"

    volumes:
      - metabase_data:/metabase-data

    depends_on:
      - postgres
    
  pgadmin:
     image: dpage/pgadmin4
     container_name: pgadmin_estudo

     environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com
      PGADMIN_DEFAULT_PASSWORD: admin

     ports:
        - "5050:80"


volumes:
  postgres_data:
  metabase_data:

